services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ai_trainer
      POSTGRES_PASSWORD: ai_trainer
      POSTGRES_DB: ai_trainer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_trainer:ai_trainer@db:5432/ai_trainer
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./uploads:/app/uploads

volumes:
  pgdata:
